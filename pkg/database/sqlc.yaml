# Template konfigurasi sqlc untuk service ISPBoss.
# Salin file ini ke direktori service dan sesuaikan path-nya.
#
# Contoh penggunaan di services/billing-api/:
#   cp pkg/database/sqlc.yaml services/billing-api/sqlc.yaml
#   Lalu sesuaikan "queries" dan "schema" path.
#
# Dokumentasi lengkap: https://docs.sqlc.dev/en/latest/reference/config.html

version: "2"

sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "repository"
        out: "internal/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_prepared_queries: false
